# /etc/nginx/sites-available/quai-emissions
#
# Reverse proxy: HTTPS → localhost:3000 (Next.js).
#
# Replace before installing:
#   - server_name dashboard.example.com  → your real hostname
#   - ssl_certificate / ssl_certificate_key paths → certbot output paths
#
# Install:
#   sudo cp deploy/nginx-quai-emissions.conf /etc/nginx/sites-available/quai-emissions
#   sudo ln -s /etc/nginx/sites-available/quai-emissions /etc/nginx/sites-enabled/
#   sudo nginx -t                          # syntax check
#   sudo systemctl reload nginx
#
# TLS via Let's Encrypt:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d dashboard.example.com
#   (certbot will rewrite this file; review its diff before accepting)

# ── HTTP ─ redirect to HTTPS ─────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name dashboard.example.com;

    # Let certbot's HTTP-01 challenge through.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─ reverse proxy to Next.js ─────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dashboard.example.com;

    # TLS — replace these paths with your certbot output.
    ssl_certificate     /etc/letsencrypt/live/dashboard.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers. Adjust CSP if you embed third-party widgets.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Compression — Recharts SSR output, JSON API responses, and JS bundles
    # all compress well.
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # Reasonable body / buffer limits. Dashboard is read-only, so we don't
    # need large client_max_body_size.
    client_max_body_size 1m;

    # ── Static immutable assets — cache hard ─────────────────────────────
    # Next.js fingerprints these so they're safe to cache for a year.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # ── Image optimizer — short cache ────────────────────────────────────
    location /_next/image {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 60m;
    }

    # ── App routes + API ─ proxy everything else ─────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_cache_bypass $http_upgrade;

        # API rollup queries can take a few seconds on cold cache.
        # Default upstream timeout is fine for current data volumes.
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    60s;
    }

    # Optional: deny access to dotfiles served accidentally
    location ~ /\.(?!well-known) {
        deny all;
    }
}
